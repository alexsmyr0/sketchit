{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SketchIt Game</title>
    <link rel="stylesheet" href="{% static 'rooms/game.css' %}">
</head>
<body>
<div id="game-view">
    <div id="timer-bar" class="hud"></div>
    <div id="drawer-word-display" class="hud hidden"></div>
    <div id="score-board" class="hud"></div>
    <div id="intermission-overlay" class="overlay hidden">
        <h2 id="intermission-title">Intermission</h2>
        <div id="intermission-results"></div>
        <button id="back-to-lobby-btn" class="hidden">Back to Lobby</button>
    </div>
    <div id="guess-section">
        <input type="text" id="guess-input" placeholder="Enter your guess..." autocomplete="off" />
        <button id="guess-submit">Submit</button>
        <div id="guess-result"></div>
    </div>
    <canvas id="drawing-canvas"></canvas>
</div>
<script src="{% static 'rooms/game.js' %}"></script>
</body>
</html>
