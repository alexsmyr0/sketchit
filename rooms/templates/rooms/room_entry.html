<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchIt - Join or Create Room</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        section { border: 1px solid #ccc; padding: 1.5rem; margin-bottom: 2rem; border-radius: 8px; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.25rem; font-weight: bold; }
        input, select { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { padding: 0.5rem 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .error { color: red; margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>Welcome to SketchIt</h1>

    <section>
        <h2>Join a Room</h2>
        <form id="join-form">
            <div class="form-group">
                <label for="join_code">Room Code (e.g. ABC12345)</label>
                <input type="text" id="join_code" required>
            </div>
            <div class="form-group">
                <label for="join_display_name">Your Nickname</label>
                <input type="text" id="join_display_name" required maxlength="24">
            </div>
            <button type="submit">Join Room</button>
            <div id="join-error" class="error"></div>
        </form>
    </section>

    <section>
        <h2>Create a Room</h2>
        <form id="create-form">
            <div class="form-group">
                <label for="room_name">Room Name</label>
                <input type="text" id="room_name" required maxlength="255">
            </div>
            <div class="form-group">
                <label for="create_display_name">Your Nickname</label>
                <input type="text" id="create_display_name" required maxlength="24">
            </div>
            <div class="form-group">
                <label for="visibility">Visibility</label>
                <select id="visibility" required>
                    <option value="private">Private</option>
                    <option value="public">Public</option>
                </select>
            </div>
            <button type="submit">Create Room</button>
            <div id="create-error" class="error"></div>
        </form>
    </section>

    {{ csrf_input }}

    <script>
        // Use Django's CSRF token from the cookie
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function submitJsonRequest(url, payload, errorElementId) {
            const errorElement = document.getElementById(errorElementId);
            errorElement.textContent = '';
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || ''
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = data.room_url;
                } else {
                    errorElement.textContent = data.detail || JSON.stringify(data.errors) || 'An error occurred.';
                }
            } catch (err) {
                errorElement.textContent = 'Network error. Please try again.';
            }
        }

        document.getElementById('join-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const joinCode = document.getElementById('join_code').value.trim();
            const displayName = document.getElementById('join_display_name').value.trim();
            
            if (!joinCode || !displayName) return;
            
            submitJsonRequest(`/rooms/${joinCode}/join/`, { display_name: displayName }, 'join-error');
        });

        document.getElementById('create-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const roomName = document.getElementById('room_name').value.trim();
            const displayName = document.getElementById('create_display_name').value.trim();
            const visibility = document.getElementById('visibility').value;
            
            if (!roomName || !displayName || !visibility) return;
            
            submitJsonRequest('/rooms/create/', { 
                name: roomName, 
                display_name: displayName,
                visibility: visibility 
            }, 'create-error');
        });
    </script>
</body>
</html>
